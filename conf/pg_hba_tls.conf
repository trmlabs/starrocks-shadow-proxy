# pg_hba.conf — TLS-required configuration for the Postgres TLS test stack.
#
# Mirrors AlloyDB's posture: every external connection MUST be over TLS.
# A plaintext attempt is rejected at the protocol level with
#   "FATAL: no pg_hba.conf entry for host ..., no encryption"
# which is exactly the error the live AlloyDB cluster returned during the
# 2026-05-21 staging smoke test against PR #7's transparent-forward proxy.
#
# This file is mounted into the postgres-primary-tls / postgres-shadow-tls
# containers via docker-compose.pg-tls.yaml and selected via
#   postgres -c hba_file=/etc/postgresql/pg_hba.conf
#
# TYPE        DATABASE  USER  ADDRESS         METHOD
local         all       all                   trust
hostssl       all       all   0.0.0.0/0       scram-sha-256
hostssl       all       all   ::/0            scram-sha-256
# No non-ssl host lines — anything that isn't TLS gets rejected by the
# default "no matching line" behavior, which surfaces the "no encryption"
# error a plaintext client sees.
